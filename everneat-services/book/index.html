<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book a Cleaning · Everneat</title>
<meta name="description" content="Book your Everneat probiotic cleaning — quote in 60 seconds, pay when it's done, happiness guaranteed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f1ea;--ink:#1f1d18;--ink2:#57524a;--muted:#8b867a;--line2:#d9d4c7;--card:#fff;
    --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin-inline:auto;padding-inline:clamp(20px,5vw,64px)}
  header{display:flex;align-items:center;justify-content:space-between;height:80px}
  .logo{font-family:var(--serif);font-style:italic;font-weight:500;font-size:30px;color:var(--ink);text-decoration:none}
  header a.alt{text-decoration:none;color:var(--ink2);font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  header a.alt:hover{color:var(--ink)}
  h1{font-family:var(--serif);font-style:italic;text-transform:uppercase;font-weight:500;
    font-size:clamp(30px,4vw,46px);letter-spacing:.008em;line-height:1.05;margin:clamp(28px,4vw,56px) 0 10px;text-align:center}
  .sub{text-align:center;color:var(--ink2);margin:0 0 clamp(28px,4vw,44px)}
  .widget-shell{background:var(--card);border:1px solid var(--line2);border-radius:20px;
    padding:clamp(8px,1.5vw,20px);min-height:640px;box-shadow:0 1px 2px rgba(30,28,22,.04),0 26px 50px -30px rgba(30,28,22,.28)}
  booking-widget{display:block;min-height:600px}
  .fallback{text-align:center;color:var(--muted);font-size:14px;margin:28px 0 64px}
  .fallback a{color:var(--ink2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo" href="../v2/">everneat</a>
    <a class="alt" href="../contact/">Talk to a human</a>
  </header>
  <h1>Book your cleaning</h1>
  <p class="sub">Quote in 60 seconds. Pay when it's done. Happiness guaranteed.</p>
  <div class="widget-shell">
    <booking-widget></booking-widget>
    <script src="https://everneat.neatr.ai/embed.js"></script>
  </div>
  <p class="fallback">Prefer a person? Call <a href="tel:+13475028828">347-502-8828</a>,
    email <a href="mailto:contact@everneat.co">contact@everneat.co</a>,
    or <a href="https://cal.com/team/everneat-services" rel="noopener">book a consultation</a>.</p>
</div>
</body></html>
